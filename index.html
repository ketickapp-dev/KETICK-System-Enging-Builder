<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Builder Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* GLASS EDITION */
        .theme-glass { background: linear-gradient(135deg, #e0e7ff, #f3f4f6); color: #1e293b; }
        .theme-glass .sidebar { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.3); color: #1e293b; }
        .theme-glass .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); }
        .theme-glass .btn-active { background: rgba(79, 70, 229, 0.1); border-left: 4px solid #4f46e5; }

        /* CYBERPUNK EDITION */
        .theme-cyberpunk { background: #0a0a12; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .theme-cyberpunk .sidebar { background: #0d0d17; border-right: 2px solid #ff003c; color: #00ff41; }
        .theme-cyberpunk .glass-card { background: #16213e; border: 1px solid #00fff9; box-shadow: 0 0 15px rgba(0, 255, 249, 0.3); color: white; }
        .theme-cyberpunk .btn-active { background: #1a1a2e; border-left: 4px solid #ff003c; color: #ff003c; text-shadow: 0 0 5px #ff003c; }
        .theme-cyberpunk th { color: #ff003c; border-bottom: 1px solid #ff003c; }

        /* FLUX EDITION */
        .theme-flux { background: #0f172a; color: #f8fafc; }
        .theme-flux .sidebar { background: #1e293b; border-right: 1px solid #334155; }
        .theme-flux .glass-card { background: #1e293b; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .theme-flux .btn-active { background: #334155; border-left: 4px solid #38bdf8; }
    </style>
</head>
<body :class="'theme-' + config.theme" 
      x-data="{ 
        sidebarOpen: true, 
        activeTab: 'dashboard',
        config: { projectName: 'Loading...', modules: [], theme: 'glass' },
        async init() {
            try {
                this.config = await (await fetch('./config.json')).json();
            } catch (e) {
                console.error('Sila pastikan fail config.json wujud dalam folder root.');
            }
        }
      }">

    <div class="flex h-screen overflow-hidden">
        
        <aside :class="sidebarOpen ? 'w-64' : 'w-20'" class="sidebar transition-all duration-300 flex flex-col shadow-xl z-20">
            <div class="p-4 font-bold text-xl border-b border-gray-700 flex justify-between items-center whitespace-nowrap overflow-hidden">
                <span x-show="sidebarOpen" x-text="config.projectName"></span>
                <button @click="sidebarOpen = !sidebarOpen" class="p-2 hover:opacity-50 transition-opacity">☰</button>
            </div>
            
            <nav class="mt-4 flex-1 overflow-y-auto">
                <template x-for="modul in config.modules" :key="modul.id">
                    <button @click="activeTab = modul.id" 
                        :class="activeTab === modul.id ? 'btn-active' : 'hover:bg-black hover:bg-opacity-5'"
                        class="w-full flex items-center p-4 transition-all duration-200">
                        <span class="text-xl" x-text="modul.icon"></span>
                        <span class="ml-4 font-medium" x-show="sidebarOpen" x-text="modul.title"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto flex flex-col relative">
            <header class="p-4 flex justify-between items-center border-b border-gray-700 bg-opacity-30 backdrop-blur-md sticky top-0 z-10">
                <h2 class="text-xl font-bold capitalize" x-text="config.modules?.find(m => m.id === activeTab)?.title || activeTab"></h2>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] uppercase tracking-widest opacity-60">Engine Mode</p>
                        <p class="text-xs font-mono" x-text="config.theme"></p>
                    </div>
                    <div class="w-10 h-10 rounded-full border border-gray-500 flex items-center justify-center font-bold bg-white bg-opacity-10">
                        K
                    </div>
                </div>
            </header>

            <div class="p-6">
                
                <template x-if="config.modules?.find(m => m.id === activeTab)?.type === 'stats_grid'">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-xl border-b-4 border-indigo-500">
                            <p class="opacity-60 text-xs font-bold uppercase tracking-wider">Status Enjin</p>
                            <p class="text-2xl font-black mt-1">Sedia & Aktif</p>
                        </div>
                        <div class="glass-card p-6 rounded-xl border-b-4 border-emerald-500">
                            <p class="opacity-60 text-xs font-bold uppercase tracking-wider">Modul Terpasang</p>
                            <p class="text-2xl font-black mt-1" x-text="config.modules?.length"></p>
                        </div>
                    </div>
                </template>

                <template x-if="config.modules?.find(m => m.id === activeTab)?.type === 'datatable'">
                    <div class="glass-card rounded-xl overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-black bg-opacity-20 text-xs font-bold uppercase tracking-tighter">
                                        <template x-for="field in config.modules?.find(m => m.id === activeTab)?.fields">
                                            <th class="p-4" x-text="field"></th>
                                        </template>
                                        <th class="p-4 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="row in config.modules?.find(m => m.id === activeTab)?.data">
                                        <tr class="border-b border-gray-700 border-opacity-10 hover:bg-white hover:bg-opacity-5 transition-colors">
                                            <template x-for="field in config.modules?.find(m => m.id === activeTab)?.fields">
                                                <td class="p-4 text-sm" x-text="row[field]"></td>
                                            </template>
                                            <td class="p-4 text-center space-x-2">
                                                <button class="text-blue-400 text-xs font-bold hover:underline">EDIT</button>
                                                <button class="text-red-500 text-xs font-bold hover:underline">PADAM</button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div x-show="!config.modules?.find(m => m.id === activeTab)?.data" class="p-10 text-center opacity-40 italic">
                            Tiada data tersedia untuk modul ini.
                        </div>
                    </div>
                </template>

                <template x-if="['stats_grid', 'datatable'].indexOf(config.modules?.find(m => m.id === activeTab)?.type) === -1">
                    <div class="glass-card p-12 rounded-2xl text-center border-2 border-dashed border-gray-500 border-opacity-30">
                        <div class="text-6xl mb-4" x-text="config.modules?.find(m => m.id === activeTab)?.icon"></div>
                        <h3 class="text-xl font-bold">Modul <span x-text="config.modules?.find(m => m.id === activeTab)?.title"></span></h3>
                        <p class="opacity-60 mt-2 italic">Fungsi penjanaan automatik bagi <span x-text="config.modules?.find(m => m.id === activeTab)?.type"></span> akan tersedia tidak lama lagi.</p>
                    </div>
                </template>

            </div>
        </main>
    </div>
</body>
</html>
